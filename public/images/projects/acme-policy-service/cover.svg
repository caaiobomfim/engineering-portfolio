<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#f3f4f6"/>

  <!-- Controller -->
  <rect x="20" y="178" width="110" height="55" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="75" y="201" font-family="monospace" font-size="11" fill="#1d4ed8" text-anchor="middle">Controller</text>
  <text x="75" y="216" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">REST /policies</text>
  <text x="75" y="228" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">RFC 7807 Errors</text>

  <!-- Use Cases -->
  <rect x="175" y="178" width="110" height="55" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="230" y="199" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">Use Cases</text>
  <text x="230" y="214" font-family="monospace" font-size="9" fill="#7c3aed" text-anchor="middle">Create · Get</text>
  <text x="230" y="227" font-family="monospace" font-size="9" fill="#7c3aed" text-anchor="middle">List · Cancel</text>

  <!-- Domain -->
  <rect x="335" y="140" width="130" height="120" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="400" y="163" font-family="monospace" font-size="11" fill="#065f46" text-anchor="middle">Domain</text>
  <text x="400" y="180" font-family="monospace" font-size="9" fill="#047857" text-anchor="middle">PolicyStateMachine</text>
  <text x="400" y="195" font-family="monospace" font-size="9" fill="#047857" text-anchor="middle">FraudRules</text>
  <text x="400" y="210" font-family="monospace" font-size="9" fill="#047857" text-anchor="middle">Policy · Status</text>
  <text x="400" y="225" font-family="monospace" font-size="9" fill="#047857" text-anchor="middle">CorrelationStore</text>
  <text x="400" y="242" font-family="monospace" font-size="9" fill="#047857" text-anchor="middle">Ports (in / out)</text>

  <!-- DynamoDB -->
  <rect x="335" y="300" width="130" height="50" rx="6" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="400" y="322" font-family="monospace" font-size="11" fill="#374151" text-anchor="middle">DynamoDB</text>
  <text x="400" y="338" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">PolicyRequests + GSI</text>

  <!-- Fraud API -->
  <rect x="520" y="148" width="120" height="55" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="580" y="170" font-family="monospace" font-size="11" fill="#92400e" text-anchor="middle">Fraud Gateway</text>
  <text x="580" y="185" font-family="monospace" font-size="9" fill="#b45309" text-anchor="middle">OpenFeign Client</text>
  <text x="580" y="198" font-family="monospace" font-size="9" fill="#b45309" text-anchor="middle">→ External API</text>

  <!-- SQS Publisher -->
  <rect x="520" y="248" width="120" height="55" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5"/>
  <text x="580" y="269" font-family="monospace" font-size="11" fill="#9d174d" text-anchor="middle">SQS Queues</text>
  <text x="580" y="284" font-family="monospace" font-size="9" fill="#be185d" text-anchor="middle">payments-topic</text>
  <text x="580" y="297" font-family="monospace" font-size="9" fill="#be185d" text-anchor="middle">subscriptions-topic</text>

  <!-- Consumers -->
  <rect x="690" y="190" width="100" height="70" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="740" y="213" font-family="monospace" font-size="11" fill="#991b1b" text-anchor="middle">Consumers</text>
  <text x="740" y="228" font-family="monospace" font-size="9" fill="#b91c1c" text-anchor="middle">Payment</text>
  <text x="740" y="242" font-family="monospace" font-size="9" fill="#b91c1c" text-anchor="middle">Subscription</text>

  <!-- Arrows -->
  <!-- Controller → Use Cases -->
  <line x1="130" y1="205" x2="173" y2="205" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Use Cases → Domain -->
  <line x1="285" y1="205" x2="333" y2="205" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Domain → DynamoDB -->
  <line x1="400" y1="260" x2="400" y2="298" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Domain → Fraud Gateway -->
  <line x1="465" y1="175" x2="518" y2="175" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Domain → SQS -->
  <line x1="465" y1="235" x2="518" y2="268" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQS → Consumers -->
  <line x1="640" y1="268" x2="688" y2="235" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="285" x2="688" y2="250" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Consumers → Domain (feedback: approval signals) -->
  <path d="M 690 225 Q 640 130 470 160" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- State flow labels (top) -->
  <text x="400" y="38" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">RECEIVED → VALIDATED → PENDING → APPROVED / REJECTED / CANCELLED</text>
  <line x1="100" y1="46" x2="700" y2="46" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Footer label -->
  <text x="400" y="395" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">ACME Policy Service — Hexagonal Architecture + Event-Driven + State Machine</text>
</svg>
