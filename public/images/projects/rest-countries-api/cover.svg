<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f3f4f6"/>

  <!-- Client -->
  <rect x="30" y="170" width="110" height="60" rx="6" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="85" y="197" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">HTTP Client</text>
  <text x="85" y="213" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">requests</text>

  <!-- Controller -->
  <rect x="190" y="155" width="120" height="90" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="250" y="193" font-family="monospace" font-size="11" fill="#1d4ed8" text-anchor="middle">Controller</text>
  <text x="250" y="209" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">REST endpoints</text>
  <text x="250" y="225" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">validation</text>

  <!-- Service -->
  <rect x="360" y="155" width="120" height="90" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="420" y="193" font-family="monospace" font-size="11" fill="#5b21b6" text-anchor="middle">Service</text>
  <text x="420" y="209" font-family="monospace" font-size="10" fill="#7c3aed" text-anchor="middle">business logic</text>
  <text x="420" y="225" font-family="monospace" font-size="10" fill="#7c3aed" text-anchor="middle">orchestration</text>

  <!-- Feign Client -->
  <rect x="530" y="155" width="120" height="90" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="590" y="193" font-family="monospace" font-size="11" fill="#166534" text-anchor="middle">Feign Client</text>
  <text x="590" y="209" font-family="monospace" font-size="10" fill="#15803d" text-anchor="middle">typed HTTP</text>
  <text x="590" y="225" font-family="monospace" font-size="10" fill="#15803d" text-anchor="middle">error decoder</text>

  <!-- External API -->
  <rect x="700" y="170" width="85" height="60" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="742" y="197" font-family="monospace" font-size="10" fill="#92400e" text-anchor="middle">REST</text>
  <text x="742" y="211" font-family="monospace" font-size="10" fill="#92400e" text-anchor="middle">Countries</text>
  <text x="742" y="225" font-family="monospace" font-size="9" fill="#b45309" text-anchor="middle">API externa</text>

  <!-- Arrows -->
  <line x1="140" y1="200" x2="190" y2="200" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="188,196 196,200 188,204" fill="#9ca3af"/>
  <line x1="310" y1="200" x2="360" y2="200" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="358,196 366,200 358,204" fill="#9ca3af"/>
  <line x1="480" y1="200" x2="530" y2="200" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="528,196 536,200 528,204" fill="#9ca3af"/>
  <line x1="650" y1="200" x2="700" y2="200" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="698,196 706,200 698,204" fill="#9ca3af"/>

  <!-- WireMock label below Feign -->
  <rect x="535" y="265" width="110" height="28" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="590" y="283" font-family="monospace" font-size="10" fill="#c2410c" text-anchor="middle">WireMock (testes)</text>
  <line x1="590" y1="245" x2="590" y2="265" stroke="#fed7aa" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="400" y="370" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">Journey Lab — REST Countries API — Arquitetura</text>
</svg>
